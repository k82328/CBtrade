<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>CB 可轉債追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#f5f5f5;color:#222}
.header{background:#fff;border-bottom:1px solid #ddd;padding:0 16px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100;gap:12px}
.header h1{font-size:15px;font-weight:700;color:#1a73e8}
.hdate{font-size:11px;color:#999;margin-left:auto}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 16px}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:#777;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:#333}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}
.panel{display:none;padding:12px 16px}
.panel.active{display:block}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:6px 14px}
.stat-l{font-size:10px;color:#888}
.stat-v{font-size:18px;font-weight:700}
.green{color:#27ae60}.blue{color:#1a73e8}.orange{color:#e67e22}.red{color:#e74c3c}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input[type=text],select{padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#222}
input[type=text]:focus,select:focus{outline:none;border-color:#1a73e8}
.cnt{font-size:11px;color:#999;margin-left:auto}
.tbl-wrap{overflow-x:auto;background:#fff;border:1px solid #e0e0e0;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#fafafa;border-bottom:2px solid #ddd;padding:7px 8px;text-align:right;font-weight:600;font-size:11px;color:#555;white-space:nowrap;cursor:pointer;user-select:none}
thead th.left{text-align:left}
thead th:hover{color:#1a73e8}
.arr{margin-left:3px;font-size:9px;opacity:.4}
th.sk .arr{opacity:1;color:#1a73e8}
tbody tr:hover td{background:#f0f6ff}
tbody tr:nth-child(even) td{background:#fafafa}
tbody tr:nth-child(even):hover td{background:#f0f6ff}
td{padding:5px 8px;border-bottom:1px solid #eee;text-align:right;white-space:nowrap}
td.left{text-align:left}
td.mono{font-family:monospace;font-size:11px;color:#777}
.badge{font-size:11px;border-radius:3px;padding:1px 6px;display:inline-block;font-weight:600}
.row-checked{background:#c8c8c8 !important}
.row-checked:hover{background:#bbbbbb !important}
.note-in{background:none;border:none;border-bottom:1px dashed #ccc;width:100%;min-width:90px;font-size:12px;padding:1px 2px;outline:none;color:#222;font-family:inherit}
.note-in:focus{border-bottom-color:#1a73e8;background:#f0f6ff}
.cheap{background:#d4edda;color:#155724}
.fair{background:#cce5ff;color:#004085}
.prem{background:#ffeeba;color:#856404}
.buy{background:#d4edda;color:#155724}
.sell{background:#fde8e8;color:#c0392b}
.flat{background:#f0f0f0;color:#888}
.na{color:#ccc}
.bar-wrap{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.bar{height:10px;border-radius:2px}
.bar.p{background:#27ae60}.bar.n{background:#e74c3c}
.bv{font-family:monospace;font-size:11px;min-width:42px;text-align:right}
.bv.p{color:#27ae60;font-weight:600}.bv.n{color:#e74c3c;font-weight:600}.bv.z{color:#ccc}
.pager{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#888}
.pager button{padding:4px 12px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:12px}
.pager button:hover{border-color:#1a73e8;color:#1a73e8}
.pager button:disabled{opacity:.3;cursor:default}
.nodata{text-align:center;padding:40px;color:#aaa;font-size:13px}
.loading{text-align:center;padding:40px;color:#aaa;font-size:13px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// localStorage：儲存打勾 & 備註
const LS_KEY='cb_user_meta';
let userMeta={};
try{userMeta=JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){}
function setMeta(cbCode,field,val){
  if(!userMeta[cbCode])userMeta[cbCode]={};
  userMeta[cbCode][field]=val;
  try{localStorage.setItem(LS_KEY,JSON.stringify(userMeta));}catch(e){}
}

</script>

// ── 產業下拉 ──
(function(){
  const s=document.getElementById('vsi');
  [...new Set(Object.values(INDUSTRY))].sort().forEach(i=>{
    const o=document.createElement('option');o.value=i;o.textContent=i;s.appendChild(o);
  });

// ── Tab 切換 ──
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='v')||(i===1&&t==='i')));
  document.getElementById('pv').classList.toggle('active',t==='v');
  document.getElementById('pi').classList.toggle('active',t==='i');
  if(t==='i'&&!iLoaded) loadInst();
}

// ── 載入估值 JSON ──
function loadVal(){
  fetch('cb_tracker_latest.json?_='+Date.now())
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{
      CBD = d.data || [];
      vLoaded = true;
      document.getElementById('vloading').style.display='none';
      document.getElementById('hdate').textContent='估值：'+(d.date||d.updated||'')+'｜法人：載入中...';
      rv();
    })
    .catch(()=>{
      document.getElementById('vloading').textContent='估值資料載入失敗';
    });
}

// ── 載入法人 JSON ──
function loadInst(){
  document.getElementById('iloading').style.display='block';
  fetch('cb_inst_latest.json?_='+Date.now())
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{
      INST=d.data||[];
      iLoaded=true;
      document.getElementById('iloading').style.display='none';
      // 更新 header 日期
      const vdate = document.getElementById('hdate').textContent.split('｜')[0];
      document.getElementById('hdate').textContent=vdate+'｜法人：'+(d.date||'');
      ri();
    })
    .catch(()=>{
      document.getElementById('iloading').style.display='none';
      document.getElementById('ind').style.display='block';
    });
}

// ════ 估值 Tab ════
function gvf(){
  const q=document.getElementById('vsq').value.toLowerCase();
  const ind=document.getElementById('vsi').value;
  const tier=document.getElementById('vst').value;
  return CBD.filter(d=>{
    if(q&&!d.name.includes(q)&&!d.cb.includes(q)&&!d.stk.includes(q))return false;
    if(ind&&d.ind!==ind)return false;
    if(tier==='cheap'&&!(d.cbth!==null&&d.cbth<100))return false;
    if(tier==='fair'&&!(d.cbth!==null&&d.cbth>=100&&d.cbth<=120))return false;
    if(tier==='prem'&&!(d.cbth!==null&&d.cbth>120))return false;
    return true;
  });
}

function vgo(d){vPg+=d;rv();}

  if(!vLoaded)return;
  const rows=gvf().sort((a,b)=>{
    const av=a[vSk],bv=b[vSk];
    if(av===null&&bv===null)return 0;if(av===null)return 1;if(bv===null)return-1;
    return vSd*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const ps=parseInt(document.getElementById('vps').value);
  const tp=Math.max(1,Math.ceil(rows.length/ps));
  if(vPg>tp)vPg=1;
  const sl=rows.slice((vPg-1)*ps,vPg*ps);

  const wv=CBD.filter(d=>d.cbth!==null);
  const cheap=wv.filter(d=>d.cbth<100).length,fair=wv.filter(d=>d.cbth>=100&&d.cbth<=120).length,prem=wv.filter(d=>d.cbth>120).length;
  document.getElementById('vs').innerHTML=`
    <div class="stat"><div class="stat-l">篩選結果</div><div class="stat-v blue">${rows.length}</div></div>
    <div class="stat"><div class="stat-l">便宜 &lt;100%</div><div class="stat-v green">${cheap}</div></div>
    <div class="stat"><div class="stat-l">合理 100-120%</div><div class="stat-v blue">${fair}</div></div>
    <div class="stat"><div class="stat-l">溢價 &gt;120%</div><div class="stat-v orange">${prem}</div></div>`;
  document.getElementById('vc').textContent=`共 ${rows.length} 筆`;

  const f=(v,d=2)=>v===null||v===undefined||isNaN(v)?'<span class="na">—</span>':Number(v).toFixed(d);
  const vb=v=>{
    if(v===null||v===undefined)return'<span class="na">—</span>';
    if(v<100)return`<span class="badge cheap">${Number(v).toFixed(1)}%</span>`;
    if(v<=120)return`<span class="badge fair">${Number(v).toFixed(1)}%</span>`;
    return`<span class="badge prem">${Number(v).toFixed(1)}%</span>`;
  };
  document.getElementById('vb').innerHTML=sl.map(d=>{const isChk=userMeta[d.cb]?.checked||false;const noteVal=(userMeta[d.cb]?.note||'').replace(/"/g,'&quot;');return`<tr class="${isChk?'row-checked':''}">
    <td style="text-align:center"><input type="checkbox" ${isChk?'checked':''} onchange="setMeta('${d.cb}','checked',this.checked);rv()"></td>
    <td class="left mono">${d.cb}</td><td class="left mono">${d.stk}</td>
    <td class="left">${d.name}</td><td class="left" style="color:#888;font-size:11px">${d.ind||'—'}</td>
    <td>${f(d.conv)}</td><td>${f(d.sp)}</td><td>${f(d.cbp)}</td>
    <td>${f(d.th)}</td><td>${vb(d.cbth)}</td>
    <td>${d.stk2!==null&&d.stk2!==undefined?f(d.stk2,1)+'%':'<span class="na">—</span>'}</td>
    <td><input class="note-in" type="text" value="${noteVal}" placeholder="備註…" onchange="setMeta('${d.cb}','note',this.value)"></td>
  </tr>`}).join('');

  document.getElementById('vpi').textContent=`第 ${vPg} / ${tp} 頁`;
  document.getElementById('vpp').disabled=vPg<=1;
  document.getElementById('vpn').disabled=vPg>=tp;
  document.querySelectorAll('#pv th').forEach(th=>{
    const m=th.getAttribute('onclick')?.match(/'(\w+)'/);
    const k=m?m[1]:null;
    th.classList.toggle('sk',k===vSk);
    const arr=th.querySelector('.arr');
    if(arr)arr.textContent=k===vSk?(vSd>0?'↑':'↓'):'↕';
  });
}

// ════ 法人 Tab ════
function gif(){
  const q=document.getElementById('isq').value.toLowerCase();
  const tier=document.getElementById('ist').value;
  const sk=document.getElementById('isw').value;
  return INST.filter(d=>{
    if(q&&!d['CB名稱'].includes(q)&&!d['CB代號'].includes(q))return false;
    const v=d[sk]||0;
    if(tier==='buy'&&v<=0)return false;
    if(tier==='sell'&&v>=0)return false;
    return true;
  });
}
function si(k){if(iSk===k)iSd*=-1;else{iSk=k;iSd=-1;}iPg=1;ri();}
function igo(d){iPg+=d;ri();}
function ri(){
  if(!iLoaded)return;
  document.getElementById('ind').style.display='none';
  const rows=gif().sort((a,b)=>{
    const av=a[iSk]||0,bv=b[iSk]||0;
    return iSd*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const ps=parseInt(document.getElementById('ips').value);
  const tp=Math.max(1,Math.ceil(rows.length/ps));
  if(iPg>tp)iPg=1;
  const sl=rows.slice((iPg-1)*ps,iPg*ps);
  const mx=Math.max(1,...INST.map(d=>Math.abs(d['三大法人合計買賣超']||0)));
  const buy=INST.filter(d=>(d['三大法人合計買賣超']||0)>0).length;
  const sell=INST.filter(d=>(d['三大法人合計買賣超']||0)<0).length;
  document.getElementById('is').innerHTML=`
    <div class="stat"><div class="stat-l">資料日期</div><div class="stat-v blue" style="font-size:14px">${INST[0]?.['日期']||''}</div></div>
    <div class="stat"><div class="stat-l">有交易CB</div><div class="stat-v blue">${INST.length}</div></div>
    <div class="stat"><div class="stat-l">↑ 買超</div><div class="stat-v green">${buy}</div></div>
    <div class="stat"><div class="stat-l">↓ 賣超</div><div class="stat-v red">${sell}</div></div>`;
  document.getElementById('ic').textContent=`共 ${rows.length} 筆`;

  const bar=v=>{
    const w=Math.round(Math.abs(v)/mx*50);
    const c=v>0?'p':v<0?'n':'';
    const vc=v>0?'p':v<0?'n':'z';
    return`<div class="bar-wrap"><div class="bar ${c}" style="width:${w}px"></div><span class="bv ${vc}">${v>0?'+':''}${v}</span></div>`;
  };
  const dir=v=>v>0?'<span class="badge buy">↑買超</span>':v<0?'<span class="badge sell">↓賣超</span>':'<span class="badge flat">持平</span>';

  document.getElementById('ib').innerHTML=sl.map(d=>`<tr>
    <td class="left mono">${d['CB代號']}</td>
    <td class="left">${d['CB名稱']}</td>
    <td>${bar(d['外資_買賣超']||0)}</td>
    <td>${bar(d['投信_買賣超']||0)}</td>
    <td>${bar(d['自營_買賣超']||0)}</td>
    <td>${bar(d['三大法人合計買賣超']||0)}</td>
    <td>${dir(d['三大法人合計買賣超']||0)}</td>
  </tr>`).join('');

  document.getElementById('ipi').textContent=`第 ${iPg} / ${tp} 頁`;
  document.getElementById('ipp').disabled=iPg<=1;
  document.getElementById('ipn').disabled=iPg>=tp;
  document.querySelectorAll('#pi th').forEach(th=>{
    const m=th.getAttribute('onclick')?.match(/'([^']+)'/);
    const k=m?m[1]:null;
    th.classList.toggle('sk',k===iSk);
    const arr=th.querySelector('.arr');
    if(arr)arr.textContent=k===iSk?(iSd>0?'↑':'↓'):'↕';
  });
}


// ── 匯出 Excel ──
function exportVal(){
  const rows = gvf().sort((a,b)=>{
    const av=a[vSk],bv=b[vSk];
    if(av===null&&bv===null)return 0;if(av===null)return 1;if(bv===null)return-1;
    return vSd*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const data = [['CB代號','股票','名稱','產業','轉換價','股票現價','CB現價','理論價','CB/理論%','股/轉換%']];
  rows.forEach(d=>{
    data.push([
      d.cb, d.stk, d.name, d.ind||'—',
      d.conv??'', d.sp??'', d.cbp??'', d.th??'',
      d.cbth??'', d.stk2??''
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:10},{wch:8},{wch:16},{wch:10},{wch:8},{wch:10},{wch:8},{wch:8},{wch:10},{wch:10}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'CB估值');
  XLSX.writeFile(wb, 'cb_valuation_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function exportInst(){
  const rows = gif().sort((a,b)=>{
    const av=a[iSk]||0,bv=b[iSk]||0;
    return iSd*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const data = [['CB代號','CB名稱','外資買張','外資賣張','外資買賣超','投信買張','投信賣張','投信買賣超','自營買張','自營賣張','自營買賣超','三大法人合計買賣超','買超方向']];
  rows.forEach(d=>{
    data.push([
      d['CB代號'], d['CB名稱'],
      d['外資_買張']||0, d['外資_賣張']||0, d['外資_買賣超']||0,
      d['投信_買張']||0, d['投信_賣張']||0, d['投信_買賣超']||0,
      d['自營_買張']||0, d['自營_賣張']||0, d['自營_買賣超']||0,
      d['三大法人合計買賣超']||0,
      (d['三大法人合計買賣超']||0)>0?'買超':(d['三大法人合計買賣超']||0)<0?'賣超':'持平'
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:10},{wch:16},{wch:8},{wch:8},{wch:10},{wch:8},{wch:8},{wch:10},{wch:8},{wch:8},{wch:10},{wch:12},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '三大法人買賣超');
  const date = (INST[0]?.['日期']||'').replace(/\//g,'-');
  XLSX.writeFile(wb, 'cb_inst_'+date+'.xlsx');
}

loadVal();
