<meta charset="UTF-8">

<title>CB 可轉債追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#f5f5f5;color:#222}

/* Header */
.header{background:#fff;border-bottom:1px solid #ddd;padding:0 16px;display:flex;align-items:center;gap:12px;height:50px;position:sticky;top:0;z-index:100}
.header h1{font-size:15px;font-weight:700;color:#1a73e8}
.header .updated{font-size:11px;color:#999;margin-left:auto}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 16px}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:#777;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:#333}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}

/* Content */
.panel{display:none;padding:12px 16px}
.panel.active{display:block}

/* Summary cards */
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:6px 14px;min-width:100px}
.stat-l{font-size:10px;color:#888}
.stat-v{font-size:18px;font-weight:700}
.stat-v.green{color:#27ae60}
.stat-v.blue{color:#1a73e8}
.stat-v.orange{color:#e67e22}
.stat-v.red{color:#e74c3c}

/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input[type=text],select{padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#222}
input[type=text]:focus,select:focus{outline:none;border-color:#1a73e8}
.count{font-size:11px;color:#999;margin-left:auto}

/* Table */
.tbl-wrap{overflow-x:auto;background:#fff;border:1px solid #e0e0e0;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#fafafa;border-bottom:2px solid #ddd;padding:7px 8px;text-align:right;font-weight:600;font-size:11px;color:#555;white-space:nowrap;cursor:pointer;user-select:none}
thead th:first-child,thead th:nth-child(2),thead th:nth-child(3),thead th:nth-child(4){text-align:left}
thead th:hover{color:#1a73e8}
th .arr{margin-left:3px;font-size:9px;opacity:.4}
th.active .arr{opacity:1;color:#1a73e8}
tbody tr:hover td{background:#f0f6ff}
tbody tr:nth-child(even) td{background:#fafafa}
tbody tr:nth-child(even):hover td{background:#f0f6ff}
td{padding:5px 8px;border-bottom:1px solid #eee;text-align:right;white-space:nowrap}
td:first-child,td:nth-child(2),td:nth-child(3),td:nth-child(4){text-align:left}
td.mono{font-family:monospace;font-size:11px;color:#777}

/* Badges */
.badge{font-size:11px;border-radius:3px;padding:1px 6px;display:inline-block;font-weight:600}
.b-cheap{background:#d4edda;color:#155724}
.b-fair{background:#cce5ff;color:#004085}
.b-prem{background:#ffeeba;color:#856404}
.b-buy{background:#d4edda;color:#155724}
.b-sell{background:#fde8e8;color:#c0392b}
.b-flat{background:#f0f0f0;color:#888}
.na{color:#ccc}

/* Bar for inst tab */
.bar-wrap{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.bar{height:10px;border-radius:2px;min-width:2px;max-width:60px}
.bar.pos{background:#27ae60}
.bar.neg{background:#e74c3c}
.bv{font-family:monospace;font-size:11px;min-width:40px;text-align:right}
.bv.pos{color:#27ae60;font-weight:600}
.bv.neg{color:#e74c3c;font-weight:600}
.bv.zero{color:#ccc}

/* Pagination */
.pager{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#888}
.pager button{padding:4px 12px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:12px}
.pager button:hover{border-color:#1a73e8;color:#1a73e8}
.pager button:disabled{opacity:.3;cursor:default}

.no-data{text-align:center;padding:40px;color:#aaa;font-size:13px}
.loading{text-align:center;padding:40px;color:#aaa}
</style>

      <tbody id="v-tbody"></tbody>
    </table>
  </div>
  <div class="pager">
    <button id="v-prev" onclick="vPage(-1)">← 上頁</button>
    <span id="v-pinfo"></span>
    <button id="v-next" onclick="vPage(1)">下頁 →</button>
  </div>
</div>

// ── 狀態 ──
let INST = [];
let vSort = {k:'cbth', d:1}, iSort = {k:'三大法人合計買賣超', d:-1};
let vPage = 1, iPage_ = 1;

// ── Tab 切換 ──
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='val')||(i===1&&t==='inst')));
  document.getElementById('panel-val').classList.toggle('active', t==='val');
  document.getElementById('panel-inst').classList.toggle('active', t==='inst');
  if (t==='inst' && INST.length===0) loadInst();
}

// ── 載入三大法人 JSON ──
function loadInst() {
  document.getElementById('inst-loading').style.display='block';
  fetch('cb_inst_latest.json?_=' + Date.now())
    .then(r => { if(!r.ok) throw new Error('no file'); return r.json(); })
    .then(data => {
      INST = data.data || [];
      document.getElementById('hdr-date').textContent = '估值：2026/05/03｜法人：' + (data.date||'');
      document.getElementById('inst-loading').style.display='none';
      renderInst();
    })
    .catch(() => {
      document.getElementById('inst-loading').style.display='none';
      document.getElementById('inst-nodata').style.display='block';
    });
}

// ════ TAB 1: 估值 ════
const cbData = RAW.map(r => {
  const sp = r[5]||null, cbp = r[4]||null, conv = r[3];
  const th = (sp&&conv) ? sp/conv*100 : null;
  const cbth = (cbp&&th) ? cbp/th*100 : null;
  const stk2 = (sp&&conv) ? sp/conv*100 : null;
  return { cb:r[0], stk:r[1], name:r[2], ind:INDUSTRY[r[1]]||'—', conv, cbp, sp, th, cbth, stk2 };
});

// 產業下拉
(function(){
  const inds = [...new Set(Object.values(INDUSTRY))].sort();
  const sel = document.getElementById('v-ind');
  inds.forEach(i => { const o=document.createElement('option'); o.value=i; o.textContent=i; sel.appendChild(o); });
})();

function getValFiltered() {
  const q = document.getElementById('v-search').value.toLowerCase();
  const ind = document.getElementById('v-ind').value;
  const tier = document.getElementById('v-tier').value;
  return cbData.filter(d => {
    if (q && !d.name.includes(q) && !d.cb.includes(q) && !d.stk.includes(q)) return false;
    if (ind && d.ind !== ind) return false;
    if (tier==='cheap' && !(d.cbth!==null&&d.cbth<100)) return false;
    if (tier==='fair'  && !(d.cbth!==null&&d.cbth>=100&&d.cbth<=120)) return false;
    if (tier==='prem'  && !(d.cbth!==null&&d.cbth>120)) return false;
    return true;
  });
}

function sortVal(k) {
  document.querySelectorAll('#panel-val th').forEach(th => th.classList.remove('active'));
  if (vSort.k===k) vSort.d*=-1; else { vSort.k=k; vSort.d=1; }
  vPage=1; renderVal();
}

function renderVal() {
  const rows = getValFiltered().sort((a,b) => {
    const av=a[vSort.k], bv=b[vSort.k];
    if(av===null&&bv===null) return 0;
    if(av===null) return 1; if(bv===null) return -1;
    return vSort.d*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const ps = parseInt(document.getElementById('v-ps').value);
  const total = rows.length;
  const totalPages = Math.max(1,Math.ceil(total/ps));
  if(vPage>totalPages) vPage=1;
  const slice = rows.slice((vPage-1)*ps, vPage*ps);

  // Summary
  const withV = cbData.filter(d=>d.cbth!==null);
  const cheap=withV.filter(d=>d.cbth<100).length, fair=withV.filter(d=>d.cbth>=100&&d.cbth<=120).length, prem=withV.filter(d=>d.cbth>120).length;
  document.getElementById('val-summary').innerHTML = `
    <div class="stat"><div class="stat-l">篩選結果</div><div class="stat-v blue">${total}</div></div>
    <div class="stat"><div class="stat-l">便宜 &lt;100%</div><div class="stat-v green">${cheap}</div></div>
    <div class="stat"><div class="stat-l">合理 100-120%</div><div class="stat-v blue">${fair}</div></div>
    <div class="stat"><div class="stat-l">溢價 &gt;120%</div><div class="stat-v orange">${prem}</div></div>
  `;
  document.getElementById('v-count').textContent = `共 ${total} 筆`;

  const f = (v,d=2) => v===null||isNaN(v)?'<span class="na">—</span>':v.toFixed(d);
  const valBadge = v => {
    if(v===null) return '<span class="na">—</span>';
    if(v<100) return `<span class="badge b-cheap">${v.toFixed(1)}%</span>`;
    if(v<=120) return `<span class="badge b-fair">${v.toFixed(1)}%</span>`;
    return `<span class="badge b-prem">${v.toFixed(1)}%</span>`;
  };

  document.getElementById('v-tbody').innerHTML = slice.map(d => `<tr>
    <td class="mono">${d.cb}</td>
    <td class="mono">${d.stk}</td>
    <td>${d.name}</td>
    <td style="color:#888;font-size:11px">${d.ind}</td>
    <td>${f(d.conv)}</td>
    <td>${f(d.sp)}</td>
    <td>${f(d.cbp)}</td>
    <td>${f(d.th)}</td>
    <td>${valBadge(d.cbth)}</td>
    <td>${f(d.stk2,1)}${d.stk2!==null?'%':''}</td>
  </tr>`).join('');

  document.getElementById('v-pinfo').textContent = `第 ${vPage} / ${totalPages} 頁`;
  document.getElementById('v-prev').disabled = vPage<=1;
  document.getElementById('v-next').disabled = vPage>=totalPages;

  // Update active th
  document.querySelectorAll('#panel-val th').forEach(th => {
    const k = th.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
    if(k===vSort.k) { th.classList.add('active'); th.querySelector('.arr').textContent = vSort.d>0?'↑':'↓'; }
    else th.querySelector('.arr').textContent='↕';
  });
}

function vPage(d) { vPage+=d; renderVal(); }

// ════ TAB 2: 三大法人 ════
function getInstFiltered() {
  const q = document.getElementById('i-search').value.toLowerCase();
  const tier = document.getElementById('i-tier').value;
  const who = document.getElementById('i-who').value;
  const keyMap = {total:'三大法人合計買賣超', fgn:'外資_買賣超', trust:'投信_買賣超', dealer:'自營_買賣超'};
  const sortKey = keyMap[who] || '三大法人合計買賣超';
  return INST.filter(d => {
    if(q && !d['CB名稱'].includes(q) && !d['CB代號'].includes(q)) return false;
    const v = d[sortKey]||0;
    if(tier==='buy' && v<=0) return false;
    if(tier==='sell' && v>=0) return false;
    return true;
  });
}

function sortInst(k) {
  document.querySelectorAll('#panel-inst th').forEach(th=>th.classList.remove('active'));
  if(iSort.k===k) iSort.d*=-1; else {iSort.k=k; iSort.d=-1;}
  iPage_=1; renderInst();
}

function renderInst() {
  if(INST.length===0) return;
  document.getElementById('inst-nodata').style.display='none';
  const rows = getInstFiltered().sort((a,b)=>{
    const av=a[iSort.k]||0, bv=b[iSort.k]||0;
    return iSort.d*(typeof av==='string'?av.localeCompare(bv):av-bv);
  });
  const ps = parseInt(document.getElementById('i-ps').value);
  const total=rows.length, totalPages=Math.max(1,Math.ceil(total/ps));
  if(iPage_>totalPages) iPage_=1;
  const slice=rows.slice((iPage_-1)*ps, iPage_*ps);

  // Max for bar scaling
  const maxAbs = Math.max(1,...INST.map(d=>Math.abs(d['三大法人合計買賣超']||0)));

  const buy=INST.filter(d=>(d['三大法人合計買賣超']||0)>0).length;
  const sell=INST.filter(d=>(d['三大法人合計買賣超']||0)<0).length;
  const date=INST[0]?.['日期']||'';
  document.getElementById('inst-summary').innerHTML = `
    <div class="stat"><div class="stat-l">資料日期</div><div class="stat-v blue" style="font-size:14px">${date}</div></div>
    <div class="stat"><div class="stat-l">有交易CB數</div><div class="stat-v blue">${INST.length}</div></div>
    <div class="stat"><div class="stat-l">↑ 三大買超</div><div class="stat-v green">${buy}</div></div>
    <div class="stat"><div class="stat-l">↓ 三大賣超</div><div class="stat-v red">${sell}</div></div>
  `;
  document.getElementById('i-count').textContent=`共 ${total} 筆`;

  const bar = (v) => {
    const w = Math.round(Math.abs(v)/maxAbs*60);
    const cls = v>0?'pos':v<0?'neg':'';
    const vcls = v>0?'pos':v<0?'neg':'zero';
    return `<div class="bar-wrap"><div class="bar ${cls}" style="width:${w}px"></div><span class="bv ${vcls}">${v>0?'+':''}${v}</span></div>`;
  };
  const dirBadge = v => v>0?'<span class="badge b-buy">↑買超</span>':v<0?'<span class="badge b-sell">↓賣超</span>':'<span class="badge b-flat">持平</span>';

  document.getElementById('i-tbody').innerHTML = slice.map(d=>`<tr>
    <td class="mono">${d['CB代號']}</td>
    <td>${d['CB名稱']}</td>
    <td>${bar(d['外資_買賣超']||0)}</td>
    <td>${bar(d['投信_買賣超']||0)}</td>
    <td>${bar(d['自營_買賣超']||0)}</td>
    <td>${bar(d['三大法人合計買賣超']||0)}</td>
    <td>${dirBadge(d['三大法人合計買賣超']||0)}</td>
  </tr>`).join('');

  document.getElementById('i-pinfo').textContent=`第 ${iPage_} / ${totalPages} 頁`;
  document.getElementById('i-prev').disabled=iPage_<=1;
  document.getElementById('i-next').disabled=iPage_>=totalPages;

  document.querySelectorAll('#panel-inst th').forEach(th=>{
    const m=th.getAttribute('onclick')?.match(/'([^']+)'/);
    const k=m?m[1]:null;
    if(k===iSort.k){th.classList.add('active');th.querySelector('.arr').textContent=iSort.d>0?'↑':'↓';}
    else if(th.querySelector('.arr')) th.querySelector('.arr').textContent='↕';
  });
}

function iPage(d){iPage_+=d;renderInst();}

// 初始化
renderVal();
</script>
